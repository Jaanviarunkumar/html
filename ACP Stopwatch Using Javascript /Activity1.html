<!DOCTYPE html>
<html>
    <head>
        <title>Stopwatch Using Javascript</title>
    </head>
    <style>
    body {
        background-color: #0a0a1a;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        font-family: Arial, sans-serif;
    }

    .wrapper {
        text-align: center;
        background-color: #0d0d2b;
        padding: 40px 60px;
        border-radius: 20px;
        border: 2px solid #00aaff;
        box-shadow: 0 0 20px #00aaff, 0 0 60px #0055ff, 0 0 100px #0022cc;
    }

    h1 {
        color: #00aaff;
        text-shadow: 0 0 10px #00aaff, 0 0 30px #0055ff;
        font-size: 36px;
        letter-spacing: 4px;
    }

    p {
        color: #00ccff;
        font-size: 60px;
        font-weight: bold;
        text-shadow: 0 0 10px #00aaff, 0 0 30px #0055ff;
        letter-spacing: 6px;
    }

    button {
        background-color: transparent;
        color: #00aaff;
        border: 2px solid #00aaff;
        padding: 10px 25px;
        margin: 8px;
        font-size: 16px;
        border-radius: 8px;
        cursor: pointer;
        box-shadow: 0 0 10px #00aaff;
        transition: all 0.3s ease;
    }

    button:hover {
        background-color: #00aaff;
        color: #000;
        box-shadow: 0 0 20px #00aaff, 0 0 50px #0055ff;
    }
</style>
    <body>
        <div class="wrapper">
            <h1>Stopwatch</h1>
            <p><span id="seconds">00</span>:<span id="milliseconds">00</span></p>
            <button id="button-start">Start</button>
            <button id="button-stop">Stop</button>
            <button id="button-reset">Reset</button>
        </div>

        <script>
            var seconds = 0;
            var milliseconds = 0;
            var appendMilliseconds = document.getElementById("milliseconds");
            var appendSeconds = document.getElementById("seconds");
            var interval;

            document.getElementById("button-start").onclick = function () {
                clearInterval(interval);
                interval = setInterval(startTimer, 10);
            };

            document.getElementById("button-stop").onclick = function () {
                clearInterval(interval);
            };

            document.getElementById("button-reset").onclick = function () {
                clearInterval(interval);
                milliseconds = 0;
                seconds = 0;
                appendMilliseconds.innerHTML = "00";
                appendSeconds.innerHTML = "00";
            };

            function startTimer() {
                milliseconds++;

                if (milliseconds <= 9) {
                    appendMilliseconds.innerHTML = "0" + milliseconds;
                }
                if (milliseconds > 9) {
                    appendMilliseconds.innerHTML = milliseconds;
                }
                if (milliseconds > 99) {
                    seconds++;
                    appendSeconds.innerHTML = seconds <= 9 ? "0" + seconds : seconds;
                    milliseconds = 0;
                    appendMilliseconds.innerHTML = "00";
                }
            }
        </script>
    </body>
</html>
