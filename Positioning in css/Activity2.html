<!DOCTYPE html>
<html>
    <head>
        <title>Opacity</title>
        <style>
            div{
                background-color:#4caf50 ;
                padding: 10px;
            }
            div.First{
                opacity: 0.1;
            }
            div.second{
                opacity:0.3;
            }
           div.Third{
            opacity: 0.6;
           }     
            
        </style>
    </head>
    <body>
        <h1>The opacity Property</h1>
        <div class="First"><p>Opacity 0.1</p></div>
         <div class="second"><p>Opacity 0.3</p></div>
         <div class="Third"><p>Opacity 0.6</p></div>
         <div><p>Opacity 1(default)</p></div>
 
    </body>
</html>
