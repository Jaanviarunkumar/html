<!DOCTYPE html>
<html>
<head>
    <title>Digital Clock</title>
    <style>
        body {
            background-color: #0d0020;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        #MyClockDisplay {
            background-color: #1a0040;
            border: 3px solid #cc66ff;
            border-radius: 20px;
            padding: 40px 60px;
            font-size: 60px;
            font-weight: bold;
            color: #ffd700;
            box-shadow: 0 0 30px #cc66ff;
            letter-spacing: 5px;
        }
    </style>
</head>
<body>
    <div id="MyClockDisplay" onload="showTime()"></div>
    <script>
        function showTime(){
            var date= new Date()
            var h=date.getHours()
            var m=date.getMinutes()
            var s=date.getSeconds()
            var session= "AM"
            if(h==0){h=12}
            if(h>12){
                h=h-12
                session="PM"
            }
            h=(h<10)?"0"+h:h
            m=(m<10)?"0"+m:m
            s=(s<10)?"0"+s:s
            var time=h+":"+m+":"+s+" "+session
            document.getElementById("MyClockDisplay").innerText=time
            setTimeout(showTime,1000)
        }
        showTime()
    </script>
</body>
</html>
