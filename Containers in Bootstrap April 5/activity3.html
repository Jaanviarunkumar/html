<!DOCTYPE html>
<html>
    <head>
        <title>Containers in Bootstrap</title>
        <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js">
</script>
    </head>
    <body>
        <div class="container bg-success text-white">
            bg-success example in Bootstrap
        </div>
        <div class="container bg-primary text-white">
            bg-primary example in Bootstrap
        </div>
        <div class="container bg-secondary text-white">
            bg-secondary example in Bootstrap
        </div>
        <div class="container bg-danger text-white">
            bg-danger example in Bootstrap
        </div>
       <div class="container bg-warning text-white">
            bg-warning example in Bootstrap
        </div> 
    </body>
</html>
