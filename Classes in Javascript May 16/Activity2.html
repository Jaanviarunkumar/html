<!DOCTYPE html>
<html>
    <head>
        <title>Javascript Class Inheritance</title>
    </head>
    <body>
        <h2>Javascript Class Inheritance</h2>
        <p id="details"></p>
        <script>
            class Car{
                constructor(brand){
                    this.brand=brand
                }
                present(){
                    return "I have a "+ this.brand
                }
            }
            class Model extends Car{
                constructor(brand,model){
                    super(brand)
                    this.model=model
                }
                show(){
                    return this.present()+", it is a "+ this.model
                }
            }
            let car1=new Model("Ferrari","Model1")
document.getElementById("details").innerHTML=car1.show()
            
        </script>
    </body>
</html>
