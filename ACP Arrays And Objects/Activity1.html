<!DOCTYPE html>
<html lang="en">
<head>
    <title>Objects and Arrays 🐉</title>
    <style>
        body {
            background-color: #0d0020;
            color: white;
            font-family: Arial, sans-serif;
            padding: 30px;
        }
        h1 {
            color: #ffd700;
            text-align: center;
            font-size: 40px;
        }
        h2 {
            color: #cc66ff;
            margin-top: 30px;
        }
        .result-box {
            background-color: #1a0040;
            border-radius: 15px;
            padding: 25px;
            margin: 15px 0;
            border-left: 5px solid #ffd700;
            font-size: 18px;
        }
        .result-box h3 {
            color: #ffd700;
        }
        .answer {
            color: #cc66ff;
            font-size: 22px;
            font-weight: bold;
        }
        .creature {
            color: #ffd700;
            font-size: 22px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>🐉 Objects and Arrays in JavaScript</h1>

    <!-- Part 1: Object -->
    <h2>📦 Part 1: My Object</h2>

    <div class="result-box">
        <h3>Jaanvi's Info</h3>
        <p id="objName"></p>
        <p id="objGrade"></p>
        <p id="objHobby"></p>
        <p id="objColor"></p>
        <p id="objNumber"></p>
        <p id="objCreature"></p>
        <p id="objIdentity"></p>
    </div>

    <!-- Part 2: Array -->
    <h2>📝 Part 2: Mythical Creatures Array</h2>

    <div class="result-box">
        <h3>Accessing by Index</h3>
        <p id="arr0"></p>
        <p id="arr1"></p>
        <p id="arr2"></p>
        <p id="arr3"></p>
        <p id="arr4"></p>
    </div>

    <!-- Part 3: Array Methods -->
    <h2>⚡ Part 3: Array Methods</h2>

    <div class="result-box">
        <h3>Join Method</h3>
        <p id="arrJoin"></p>
    </div>

    <div class="result-box">
        <h3>Length Method</h3>
        <p id="arrLength"></p>
    </div>

    <div class="result-box">
        <h3>Push Method (Adding a new creature!)</h3>
        <p id="arrPush"></p>
    </div>

    <div class="result-box">
        <h3>Pop Method (Removing last creature!)</h3>
        <p id="arrPop"></p>
    </div>

    <script>

        // ---- PART 1: OBJECT ----
        var jaanvi = {
            name: "Jaanvi",
            grade: 7,
            hobby: "Reading",
            favouriteColor: "Blue",
            favouriteNumber: 936,
            favouriteCreature: "Phoenix",
            secretSuperheroIdentity: "Phoenixa"
        };

        // Displaying object using keys
        document.getElementById("objName").innerHTML =
            "🌸 Name: <span class='answer'>" + jaanvi.name + "</span>";
        document.getElementById("objGrade").innerHTML =
            "📚 Grade: <span class='answer'>" + jaanvi.grade + "</span>";
        document.getElementById("objHobby").innerHTML =
            "🎵 Hobby: <span class='answer'>" + jaanvi.hobby + "</span>";
        document.getElementById("objColor").innerHTML =
            "💙 Favourite Color: <span class='answer'>" + jaanvi.favouriteColor + "</span>";
        document.getElementById("objNumber").innerHTML =
            "🔢 Favourite Number: <span class='answer'>" + jaanvi.favouriteNumber + "</span>";
        document.getElementById("objCreature").innerHTML =
            "🔥 Favourite Mythical Creature: <span class='answer'>" + jaanvi.favouriteCreature + "</span>";
        document.getElementById("objIdentity").innerHTML =
            "🦸‍♀️ Secret Superhero Identity: <span class='answer'>" + jaanvi.secretSuperheroIdentity + "</span>";

        // ---- PART 2: ARRAY ----
        var mythicalCreatures = ["Phoenix", "Dragon", "Unicorn", "Griffin", "Mermaid"];

        // Accessing by index
        document.getElementById("arr0").innerHTML =
            "Index 0: <span class='creature'>" + mythicalCreatures[0] + " 🔥</span>";
        document.getElementById("arr1").innerHTML =
            "Index 1: <span class='creature'>" + mythicalCreatures[1] + " 🐉</span>";
        document.getElementById("arr2").innerHTML =
            "Index 2: <span class='creature'>" + mythicalCreatures[2] + " 🦄</span>";
        document.getElementById("arr3").innerHTML =
            "Index 3: <span class='creature'>" + mythicalCreatures[3] + " 🦅</span>";
        document.getElementById("arr4").innerHTML =
            "Index 4: <span class='creature'>" + mythicalCreatures[4] + " 🧜‍♀️</span>";

        // ---- PART 3: ARRAY METHODS ----

        // Join method
        document.getElementById("arrJoin").innerHTML =
            "All creatures joined: <span class='creature'>" +
            mythicalCreatures.join(" | ") + "</span>";

        // Length method
        document.getElementById("arrLength").innerHTML =
            "Total number of creatures: <span class='creature'>" +
            mythicalCreatures.length + "</span>";

        // Push method (adding new creature)
        mythicalCreatures.push("Pegasus");
        document.getElementById("arrPush").innerHTML =
            "After adding Pegasus 🐎: <span class='creature'>" +
            mythicalCreatures.join(" | ") + "</span>";

        // Pop method (removing last creature)
        mythicalCreatures.pop();
        document.getElementById("arrPop").innerHTML =
            "After removing last creature: <span class='creature'>" +
            mythicalCreatures.join(" | ") + "</span>";

    </script>

</body>
</html>
