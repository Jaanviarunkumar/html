<!DOCTYPE html>
<html>
    <head>
        <title>Javascript Array Sorting</title>
    </head>
    <body>
        <h2>Click the button to sort the array in Ascending and Descending Order.</h2>
        <button onclick="ascending()">Ascending</button>
        <button onclick="descending()">Descending</button>
        <p id="result"></p>
        <script>
            var points= [6580,936,2,10,794,60]
            document.getElementById("result").innerHTML=points
            function ascending(){
                points.sort(function(a,b){
                    return a-b
                })
             document.getElementById("result").innerHTML=points
            }
            function descending(){
                points.sort(function(a,b){
                    return b-a
                })
             document.getElementById("result").innerHTML=points
            }
        </script>
    </body>
</html>
