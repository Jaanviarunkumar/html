<!DOCTYPE html>
<html>
    <head>
        <title>Lucky draw</title>
    </head>
    <body>
        <h1>Lucky draw</h1>
        <p>Enter your name and guess a number to win</p>
        <input type="text" id="name" placeholder="your name" required>
        <br>
        <p id="message-name"></p>
        <input type="number" id="guess" placeholder="Guess a number between 1 to 5" min="1" max="5" required>
        <br>
        <p id="message-guess"></p>
        <button onclick="check form">try my luck</button>
    </body>
</html>
