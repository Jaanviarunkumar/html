<!DOCTYPE html>
<html>
    <head>
        <title>Capstone Project</title>
        <style>
            body{
                margin: 0;
                font-family: Arial, Helvetica, sans-serif;
            }
            .topnav{
                overflow: hidden;
                background-color: #333;
            }
            .topnav a{
                float: left;
                color: #1affa3;
                text-align: centre;
                padding: 14px 16px;
                text-decoration: none;
                font-size: 20px;
            }
            .topnav a.active{
                background-color: #ffe066;
                color: black;
            }
            .topnav a:hover{
                background-color: #ddd;
                color: black;
            }
            
        </style>
    </head>
    <body>
        <div class="topnav">
            <a href="#" class="active">HOME</a>
            <a href="#">ABOUT_US</a>
            <a href="#">GALLERY</a>
            <a href="#">CONTACT_US</a>
        </div>
        <section>
            <img src="Image1.jpeg" alt="Image1" class="mySlides" style="height: 500px; width: 1200px;">
            <img src="Image2.jpeg" alt="Image2" class="mySlides" style="height: 500px; width: 1200px;">
            <img src="Image3.jpeg" alt="Image3" class="mySlides" style="height: 500px; width: 1200px;">
        </section>
        <script>
            var myIndex = 0
            slider()
            function slider(){
            var i
            var x = document.getElementsByClassName("mySlides")
            for(i=0;i < x.length;i++){
                x[i].style.display="none"
            }
            myIndex++
            if(myIndex>x.length){myIndex=1}
            x[myIndex-1].style.display="block"
            setTimeout(slider,3000)
            }
        </script>
    </body>
</html>
