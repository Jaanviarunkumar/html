<!DOCTYPE html>
<html>
    <head>
        <title>Statements in Javascript</title>
    </head>
    <body>
        <H2>
            Javascript program is a list of statements to be executed by a computer

        </H2>
        <p id="id1"></p>
        <p id="id2"></p>
        <p id="id3"></p>
        <script>
            var x=2 //Statement 1
            var y=4//Statement 2
            var z=x+y //Statement 3
            document.getElementById("id1").innerHTML="The first value is "+x
            document.getElementById("id2").innerHTML="The second value is "+y
            document.getElementById("id3").innerHTML="The sum  of two numbers is "+z
        </script>
    </body>
</html>
