<!DOCTYPE html>
<html>
    <head>
        <title>Operators in Javascript</title>
    </head>
    <body>
        <h2>Operators</h2>
        <p id="result"></p>
        <script>
            var x=5
            var y=2
            var z=x-y
            document.getElementById("result").innerHTML=z
        </script>
    </body>
</html>
