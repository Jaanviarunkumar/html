<!DOCTYPE html>
<html>
    <head>
        <title> Transform</title>
        <style>
            div{
                width: 300px;
                height: 100px;
                background-color: chartreuse;
                border: 1px solid black;
            }
            #id1{
                transform: rotateX(180deg);
            }
        </style>
    </head>
    <body>
        <div>
            Codingal
        </div>
        <div id="id1">
            Codingal
        </div>
    </body>
</html>
