<!DOCTYPE html>
<html>
    <head>
        <title>Call Stack in Javascript</title>
    </head>
    <body>
        <h1>Javascript Functions</h1>
        <p id="demo"></p>
        <script>
            function add(a,b){
                return a+b
            }
            function average(a,b){
                return add(a,b)/2
            }
            let result=average(10,20)
            document.getElementById("demo").innerHTML=result
        </script>
    </body>
</html>
