<!DOCTYPE html>
<html>
    <head>
        <title>Objects in Javascript</title>
    </head>
    <body>
        <h2>Javascript Objects and its properties</h2>
        <P>There are two ways to access an object property</P>
        <p id="demo"></p>
        <script>
            //Create an object
            var person = {
                firstname:"I",
                age:12,
            };
            //Display some data from the object:
            document.getElementById("demo").innerHTML=person.firstname+" am "+ person.age + "years old";
        </script>
    </body>
</html>
