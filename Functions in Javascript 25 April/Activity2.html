<!DOCTYPE html>
<html>
    <head>
        <title>Scope Of Variables in Javascript</title>
    </head>
    <body>
        <h2>Scope Of Variables</h2>
        <button onclick="MyFunction()">Click Me!</button>
        <p id="id1"></p>
        <p id="id2"></p>
        <script>
            var y=2
            function MyFunction(){
                var x=5
              document.getElementById("id2").innerHTML=x*y
                
            }
            document.getElementById("id1").innerHTML=y
                
        </script>
    </body>
</html>
