<!DOCTYPE html>
<html>
    <head>
        <title>Functions in Javascript</title>
    </head>
    <Body>
        <h2>Functions in Javascript</h2>
        <button onclick="MyFunction(6,4)">Execute</button>
        <script>
            function MyFunction(x,y){
                if(y==undefined){
                    y=2
                }
                document.write(x*y)
            }
        </script>
    </Body>
</html>
