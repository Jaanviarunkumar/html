<!DOCTYPE html>
<html>
    <head>
        <title>Loops In Javascrript</title>
    </head>
    <body>
  <h1>Loops In Javascript</h1>
  <p id="demo"></p>
  <script>
    var fruits=["Blueberry","Raspberry","Avacodo","Mango","Peach"]
    var text=""
    var i
for(i=0;i<fruits.length;i++){
    text=text+fruits[i]+'<br>'
}
document.getElementById("demo").innerHTML=text
  </script>
    </body>
</html>
