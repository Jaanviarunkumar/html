<!DOCTYPE html>
<html>
    <head>
        <title> String Methods In Javascript</title>
    </head>
    <body>
  <h1>String Methods In Javascript</h1>
  <script>
    var str="JaAnVi ArUNkumAR"
    document.write(str.toUpperCase())
    document.write("<br>")
    document.write(str.toLowerCase())
    document.write("<br>")
    document.write(str.startsWith("J"))
document.write("<br>")
  </script>
    </body>
</html>
